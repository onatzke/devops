<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produkty — Product Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Product Dashboard</div>
  <ul class="nav-links">
    <li><a href="index.html">Start</a></li>
    <li><a href="products.html" class="active">Produkty</a></li>
    <li><a href="stats.html">Statystyki</a></li>
  </ul>
</nav>

<div class="page-layout">
  <aside class="sidebar">
    <h2 class="sidebar-title">Dodaj produkt</h2>
    <div id="add-form" class="product-form">
      <div class="form-group">
        <label for="f-name">Nazwa</label>
        <input id="f-name" type="text" placeholder="np. Laptop Pro X1" />
      </div>
      <div class="form-group">
        <label for="f-price">Cena (PLN)</label>
        <input id="f-price" type="number" min="0" step="0.01" placeholder="999.00" />
      </div>
      <div class="form-group">
        <label for="f-category">Kategoria</label>
        <input id="f-category" type="text" placeholder="np. Elektronika" />
      </div>
      <button id="submit-btn" class="btn btn-primary full-width">Dodaj produkt</button>
      <div id="form-msg" class="form-msg"></div>
    </div>
  </aside>

  <main class="products-main">
    <div class="page-header">
      <h1>Katalog produktów</h1>
      <span id="products-count" class="count-badge">ładowanie…</span>
    </div>
    <div id="error-banner" class="error-banner hidden"></div>
    <div id="products-grid" class="products-grid">
      <div class="loading-placeholder">
        <div class="spinner"></div>
        <span>Pobieranie danych z API…</span>
      </div>
    </div>
  </main>
</div>

<script>
  const API = '/api';
  const grid = document.getElementById('products-grid');
  const countEl = document.getElementById('products-count');
  const errorBanner = document.getElementById('error-banner');

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.classList.remove('hidden');
  }

  function renderCard(p) {
    const card = document.createElement('article');
    card.className = 'product-card';
    card.innerHTML = `
      <div class="product-meta">
        <span class="product-id">#${p.id}</span>
        ${p.category ? `<span class="product-cat">${p.category}</span>` : ''}
      </div>
      <h3 class="product-name">${p.name}</h3>
      <div class="product-price">${Number(p.price).toFixed(2)} <span>PLN</span></div>
    `;
    return card;
  }

  async function loadProducts() {
    try {
      const res = await fetch(`${API}/items`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const products = await res.json();
      grid.innerHTML = '';
      if (products.length === 0) {
        grid.innerHTML = '<p class="empty-state">Brak produktów. Dodaj pierwszy!</p>';
      } else {
        products.forEach(p => grid.appendChild(renderCard(p)));
      }
      countEl.textContent = `${products.length} produktów`;
    } catch (e) {
      showError(`Błąd API: ${e.message}`);
      grid.innerHTML = '';
      countEl.textContent = 'błąd';
    }
  }

  document.getElementById('submit-btn').addEventListener('click', async () => {
    const msgEl = document.getElementById('form-msg');
    const btn = document.getElementById('submit-btn');
    const name = document.getElementById('f-name').value.trim();
    const priceVal = document.getElementById('f-price').value;
    const category = document.getElementById('f-category').value.trim();

    if (!name) {
      msgEl.textContent = '✗ Podaj nazwę produktu.';
      msgEl.className = 'form-msg error';
      return;
    }
    if (!priceVal || isNaN(parseFloat(priceVal))) {
      msgEl.textContent = '✗ Podaj poprawną cenę.';
      msgEl.className = 'form-msg error';
      return;
    }

    const body = {
      name,
      price: parseFloat(priceVal),
      category: category || undefined,
    };

    btn.disabled = true;
    btn.textContent = 'Dodawanie…';

    try {
      const res = await fetch(`${API}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      msgEl.textContent = '✓ Produkt dodany!';
      msgEl.className = 'form-msg success';
      document.getElementById('f-name').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('f-category').value = '';
      await loadProducts();
    } catch (err) {
      msgEl.textContent = `✗ Błąd: ${err.message}`;
      msgEl.className = 'form-msg error';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Dodaj produkt';
      setTimeout(() => { msgEl.textContent = ''; msgEl.className = 'form-msg'; }, 3000);
    }
  });

  loadProducts();
</script>
</body>
</html>
