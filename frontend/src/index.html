<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Dashboard</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<nav class="nav">
    <div class="nav-brand">PRODUCT DASHBOARD</div>
    <ul class="nav-links">
        <li><a href="index.html" class="active">Start</a></li>
        <li><a href="products.html">Produkty</a></li>
        <li><a href="stats.html">Statystyki</a></li>
    </ul>
</nav>

<main class="hero">
    <div class="hero-grid">
        <div class="hero-text">
            <span class="hero-label">SYSTEM ZARZĄDZANIA</span>
            <h1 class="hero-title">Product<br/><em>Dashboard</em></h1>
            <div class="hero-actions">
                <a href="products.html" class="btn btn-primary">Przeglądaj produkty →</a>
                <a href="stats.html" class="btn btn-ghost">Statystyki systemu</a>
            </div>
        </div>
        <div class="hero-visual">
            <div class="card-stack">
                <div class="preview-card card-a">
                    <div class="preview-label">Produkty</div>
                    <div class="preview-number" id="hero-count">—</div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    fetch('/api/stats')
        .then(r => r.json())
        .then(d => {
            document.getElementById('hero-count').textContent = d.totalProducts ?? '—';
        })
        .catch(() => {});
</script>
</body>
</html>
