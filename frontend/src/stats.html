<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statystyki — Product Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-brand">Product Dashboard</div>
  <ul class="nav-links">
    <li><a href="index.html">Start</a></li>
    <li><a href="products.html">Produkty</a></li>
    <li><a href="stats.html" class="active">Statystyki</a></li>
  </ul>
</nav>

<main class="stats-page">
  <div class="page-header">
    <h1>Statystyki</h1>
    <button id="refresh-btn" class="btn btn-ghost" onclick="loadStats()">↻ Odśwież</button>
  </div>

  <div id="error-banner" class="error-banner hidden"></div>

  <div class="stats-grid" id="stats-grid">
    <div class="loading-placeholder">
      <div class="spinner"></div>
      <span>Pobieranie…</span>
    </div>
  </div>
</main>

<script>
  async function loadStats() {
    const grid = document.getElementById('stats-grid');
    const errorBanner = document.getElementById('error-banner');
    const btn = document.getElementById('refresh-btn');

    btn.disabled = true;
    btn.textContent = '↻ Pobieranie…';
    errorBanner.classList.add('hidden');

    try {
      const [statsRes, itemsRes] = await Promise.all([
        fetch('/api/stats'),
        fetch('/api/items'),
      ]);
      if (!statsRes.ok) throw new Error(`HTTP ${statsRes.status}`);
      if (!itemsRes.ok) throw new Error(`HTTP ${itemsRes.status}`);

      const stats = await statsRes.json();
      const items = await itemsRes.json();

      const categories = [...new Set(items.map(p => p.category).filter(Boolean))];
      const avgPrice = items.length
              ? (items.reduce((s, p) => s + p.price, 0) / items.length).toFixed(2)
              : '—';
      const maxPrice = items.length
              ? Math.max(...items.map(p => p.price)).toFixed(2)
              : '—';

      grid.innerHTML = `
        <div class="stat-card accent">
          <div class="stat-value">${items.length}</div>
          <div class="stat-label">Wszystkich produktów</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${categories.length}</div>
          <div class="stat-label">Kategorie</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgPrice !== '—' ? avgPrice + ' zł' : '—'}</div>
          <div class="stat-label">Średnia cena</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${maxPrice !== '—' ? maxPrice + ' zł' : '—'}</div>
          <div class="stat-label">Najdroższy produkt</div>
        </div>
        <div class="stat-card">
          <div class="stat-value mono">${stats.instanceId}</div>
          <div class="stat-label">ID instancji backendu</div>
        </div>
      `;
    } catch (e) {
      errorBanner.textContent = `Błąd: ${e.message}`;
      errorBanner.classList.remove('hidden');
      grid.innerHTML = '';
    } finally {
      btn.disabled = false;
      btn.textContent = '↻ Odśwież';
    }
  }

  loadStats();
</script>
</body>
</html>
